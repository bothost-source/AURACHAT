name: tarrific_chat
description: TARRIFIC CHAT - Cross-platform messaging with AI moderation, bots, and privacy-first design
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.1
  emoji_picker_flutter: ^2.2.0
  image_picker: ^1.1.2
  file_picker: ^8.0.5
  record: ^5.1.2
  audioplayers: ^6.0.0
  video_player: ^2.9.1
  chewie: ^1.8.1
  photo_view: ^0.15.0
  flutter_staggered_grid_view: ^0.7.0
  fl_chart: ^0.68.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  badges: ^3.1.2
  pull_to_refresh_flutter3: ^2.0.2
  flutter_keyboard_visibility: ^6.0.0
  scrollable_positioned_list: ^0.3.8
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  flutter_contacts: ^1.1.8
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  flutter_markdown: ^0.7.3
  flutter_html: ^3.0.0-beta.2
  dio: ^5.5.0
  socket_io_client: ^3.0.0-beta.2
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.4.2
  crypto: ^3.0.5


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
